name: hn-retry
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: probe HN account creation
        id: probe
        run: |
          BODY=$(curl -s "https://news.ycombinator.com/login" || echo "")
          if echo "$BODY" | grep -qi "account creation disabled"; then
            echo "open=false" >> $GITHUB_OUTPUT
          else
            echo "open=true" >> $GITHUB_OUTPUT
          fi

      - name: open issue when HN reopens
        if: ${{ steps.probe.outputs.open == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            // de-dup: search existing issues
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: "hn-window-open", state: "open"
            });
            if (existing.length) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: "HN account creation window OPEN — submit Show HN now",
              labels: ["hn-window-open","operations"],
              body: "Detected at " + new Date().toISOString() + ". Run `node launch/auto/hn.js` with HN_USER/HN_PASS within the next few hours."
            });
